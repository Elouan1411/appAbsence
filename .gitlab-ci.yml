default:
  image: alpine:latest
  before_script:
    - 'command -v rsync >/dev/null || ( apk add --update rsync )' 
    - 'command -v ssh-agent >/dev/null || ( apk add --update openssh )' 
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $VM_IPADDRESS >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

stages:
  - deploy:prod

prod:
  stage: deploy:prod
  script:
    - rsync --exclude ".git*" -a . $SSH_USER@$VM_IPADDRESS:$DEST_DIR
    - ssh $SSH_USER@$VM_IPADDRESS "pm2 restart site --update-env"
